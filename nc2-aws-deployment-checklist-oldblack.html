<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NC2 on AWS — Deployment Runbook</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0A0E16;
    --panel:#121826;
    --panel-2:#161E2E;
    --border:#232C3D;
    --border-soft:#1B2333;
    --text:#E7ECF3;
    --muted:#8590A3;
    --muted-2:#5D6779;
    --teal:#2DD9C4;
    --teal-dim:#1B7A6E;
    --amber:#F0A94E;
    --violet:#9C8CF0;
    --violet-dim:#4A4180;
    --red:#E8607A;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(900px 500px at 85% -10%, rgba(45,217,196,0.07), transparent 60%),
      radial-gradient(700px 400px at -5% 20%, rgba(156,140,240,0.06), transparent 60%),
      var(--ink);
    color:var(--text);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  .mono{font-family:'JetBrains Mono',monospace;}
  .display{font-family:'Space Grotesk',sans-serif;}

  /* ---------- Header ---------- */
  header{
    padding:36px 5vw 22px;
    border-bottom:1px solid var(--border-soft);
    position:relative;
  }
  .eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--teal);
    display:flex;
    align-items:center;
    gap:8px;
  }
  .eyebrow .dot{width:6px;height:6px;border-radius:50%;background:var(--teal);box-shadow:0 0 8px var(--teal);}
  h1{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:clamp(28px,4vw,42px);
    margin:10px 0 6px;
    letter-spacing:-0.01em;
  }
  .subline{
    color:var(--muted);
    font-size:14.5px;
    display:flex;
    gap:18px;
    flex-wrap:wrap;
    margin-bottom:22px;
  }
  .subline a{color:var(--muted);}
  .subline a:hover{color:var(--teal);}

  .overall-wrap{
    display:flex;
    align-items:center;
    gap:22px;
    flex-wrap:wrap;
  }
  .overall-bar{
    flex:1 1 320px;
    min-width:220px;
    height:10px;
    background:var(--panel-2);
    border-radius:99px;
    overflow:hidden;
    border:1px solid var(--border);
    position:relative;
  }
  .overall-fill{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,var(--teal-dim),var(--teal));
    border-radius:99px;
    transition:width .5s cubic-bezier(.4,0,.2,1);
  }
  .overall-pct{
    font-family:'JetBrains Mono',monospace;
    font-weight:600;
    font-size:15px;
    color:var(--teal);
    white-space:nowrap;
  }
  .actions{display:flex;gap:10px;flex-wrap:wrap;}
  .btn{
    font-family:'Inter',sans-serif;
    font-size:13px;
    font-weight:600;
    color:var(--text);
    background:var(--panel-2);
    border:1px solid var(--border);
    padding:9px 14px;
    border-radius:9px;
    cursor:pointer;
    transition:all .15s ease;
    display:inline-flex;
    align-items:center;
    gap:7px;
  }
  .btn:hover{border-color:var(--teal-dim);color:var(--teal);transform:translateY(-1px);}
  .btn.danger:hover{border-color:var(--red);color:var(--red);}
  #importFile{display:none;}

  /* ---------- Layout ---------- */
  .layout{
    display:grid;
    grid-template-columns:210px 1fr;
    gap:0;
    max-width:1180px;
    margin:0 auto;
    padding:34px 5vw 100px;
  }
  @media (max-width:880px){
    .layout{grid-template-columns:1fr;}
    .rail{display:none;}
  }

  /* ---------- Pipeline rail ---------- */
  .rail{
    position:sticky;
    top:24px;
    align-self:start;
    padding-right:26px;
  }
  .rail-line{
    position:absolute;
    left:15px;
    top:8px;
    bottom:8px;
    width:2px;
    background:var(--border);
  }
  .rail-fill{
    position:absolute;
    left:15px;
    top:8px;
    width:2px;
    background:linear-gradient(180deg,var(--teal),var(--violet));
    transition:height .5s cubic-bezier(.4,0,.2,1);
  }
  .rail-node{
    position:relative;
    display:flex;
    align-items:center;
    gap:12px;
    padding:9px 0;
    cursor:pointer;
    text-decoration:none;
  }
  .rail-dot{
    width:32px;height:32px;flex:none;
    border-radius:50%;
    background:var(--panel);
    border:2px solid var(--border);
    display:flex;align-items:center;justify-content:center;
    font-family:'JetBrains Mono',monospace;
    font-size:12px;font-weight:600;
    color:var(--muted-2);
    position:relative;z-index:1;
    transition:all .2s ease;
  }
  .rail-node.done .rail-dot{background:var(--teal);border-color:var(--teal);color:#04231F;}
  .rail-node.partial .rail-dot{border-color:var(--teal-dim);color:var(--teal);}
  .rail-node:hover .rail-dot{border-color:var(--teal);}
  .rail-label{
    font-size:12.5px;
    color:var(--muted);
    line-height:1.25;
    transition:color .2s ease;
  }
  .rail-node.done .rail-label{color:var(--text);}
  .rail-node:hover .rail-label{color:var(--text);}

  /* ---------- Stage cards ---------- */
  .stages{display:flex;flex-direction:column;gap:16px;}
  .stage{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:var(--radius);
    scroll-margin-top:20px;
    overflow:hidden;
  }
  .stage-head{
    display:flex;
    align-items:center;
    gap:14px;
    padding:16px 18px;
    cursor:pointer;
    user-select:none;
  }
  .stage-num{
    font-family:'JetBrains Mono',monospace;
    font-size:13px;
    font-weight:600;
    color:var(--muted-2);
    background:var(--panel-2);
    border:1px solid var(--border);
    border-radius:7px;
    padding:4px 8px;
    flex:none;
  }
  .stage-title{
    font-family:'Space Grotesk',sans-serif;
    font-weight:600;
    font-size:16.5px;
    flex:1;
  }
  .stage-title .stage-sub{
    display:block;
    font-family:'Inter',sans-serif;
    font-weight:400;
    font-size:13px;
    color:var(--muted);
    margin-top:2px;
  }
  .stage-badge{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    font-weight:600;
    color:var(--muted);
    background:var(--panel-2);
    border:1px solid var(--border);
    padding:4px 9px;
    border-radius:99px;
    flex:none;
    min-width:44px;
    text-align:center;
  }
  .stage.complete .stage-badge{color:var(--teal);border-color:var(--teal-dim);background:rgba(45,217,196,0.08);}
  .chev{
    flex:none;
    color:var(--muted-2);
    transition:transform .2s ease;
    font-size:12px;
  }
  .stage.open .chev{transform:rotate(90deg);}

  .stage-body{
    display:none;
    padding:0 18px 18px 18px;
    border-top:1px solid var(--border-soft);
  }
  .stage.open .stage-body{display:block;}

  .note{
    display:flex;
    gap:10px;
    padding:11px 13px;
    border-radius:9px;
    font-size:13px;
    line-height:1.55;
    margin:14px 0 4px;
    background:var(--panel-2);
    border:1px solid var(--border-soft);
    border-left:3px solid var(--violet);
    color:var(--muted);
    white-space:pre-line;
  }
  .note.warn{border-left-color:var(--amber);}
  .note b, .note strong{color:var(--text);}

  .items{list-style:none;margin:12px 0 0;padding:0;display:flex;flex-direction:column;}
  .item{
    border-top:1px solid var(--border-soft);
  }
  .item:first-child{border-top:none;}
  .item-row{
    display:flex;
    align-items:flex-start;
    gap:12px;
    padding:11px 0;
    cursor:pointer;
  }
  .cb{
    flex:none;
    width:20px;height:20px;
    margin-top:1px;
    border-radius:6px;
    border:1.5px solid var(--border);
    background:var(--panel-2);
    display:flex;align-items:center;justify-content:center;
    transition:all .15s ease;
  }
  .cb svg{width:12px;height:12px;opacity:0;transition:opacity .1s ease;stroke:#04231F;}
  .item.checked .cb{background:var(--teal);border-color:var(--teal);}
  .item.checked .cb svg{opacity:1;}
  .item-label{
    font-size:14.5px;
    line-height:1.4;
    padding-top:1px;
  }
  .item.checked .item-label{color:var(--muted);text-decoration:line-through;text-decoration-color:var(--border);}
  .item-tag{
    font-family:'JetBrains Mono',monospace;
    font-size:10.5px;
    color:var(--muted-2);
    border:1px solid var(--border);
    padding:1px 6px;
    border-radius:5px;
    margin-left:8px;
    vertical-align:middle;
  }
  .item .note{margin-left:32px;margin-top:2px;margin-bottom:10px;}
  .item-children{margin-left:32px;display:flex;flex-direction:column;list-style:none;padding:0;}

  footer{
    text-align:center;
    color:var(--muted-2);
    font-size:12.5px;
    padding:10px 5vw 40px;
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow"><span class="dot"></span>RUNBOOK · INTERACTIVE CHECKLIST</div>
  <h1>NC2 on AWS — Deployment Workflow</h1>
  <div class="subline">
    <span>Source: <a href="https://squasta.github.io/nc2onawsdeploymentworkflow.html" target="_blank">squasta.github.io</a></span>
    <span>Mind map updated on July 16, 2026</span>
  </div>
  <div class="overall-wrap">
    <div class="overall-bar"><div class="overall-fill" id="overallFill"></div></div>
    <div class="overall-pct" id="overallPct">0 / 0</div>
    <div class="actions">
      <button class="btn" id="expandAllBtn">Expand all</button>
      <button class="btn" id="exportBtn">⬇ Export progress</button>
      <button class="btn" id="importBtn">⬆ Import</button>
      <input type="file" id="importFile" accept="application/json">
      <button class="btn danger" id="resetBtn">Reset</button>
    </div>
  </div>
</header>

<div class="layout">
  <nav class="rail" id="rail">
    <div class="rail-line"></div>
    <div class="rail-fill" id="railFill"></div>
  </nav>
  <main class="stages" id="stages"></main>
</div>

<footer>Progress isn't saved automatically (no storage between sessions) — use "Export" to keep a backup, then "Import" to reload it later.</footer>

<script>
const DATA = [
  {
    id:"s1", title:"Setting up My Nutanix Account", sub:"and activating NC2",
    note:"A My Nutanix account lets you subscribe to, access, and manage NC2.",
    items:[
      {id:"1.1", label:"Create a new shared workspace with the Account Admin Role",
        note:"The shared workspace should be used when activating the NC2 console, reserving license capacity for NC2, or activating the NC2 PAYG subscription. You can also join a shared workspace you have been invited to."},
      {id:"1.2", label:"Activate PAYG Subscription", tag:"💲"},
      {id:"1.3", label:"Configure License Capacity Reservation"}
    ]
  },
  {
    id:"s2", title:"Setting up AWS Account and resources",
    note:"An AWS user that can access the AWS console and has create IAM user permission.\nSetting AWS vCPU Limits — 1 physical core = 2 vCPUs.",
    items:[
      {id:"2.1", label:"Create an AWS user with console access + IAM user creation permission"},
      {id:"2.2", label:"Create an IAM User with 3 permissions",
        note:"IAMFullAccess · AWS_ConfigRole · AWSCloudFormationFullAccess"},
      {id:"2.3", label:"(Optional) Pre-create the 2 Nutanix IAM roles yourself"},
      {id:"2.4", label:"Check / raise AWS vCPU limits", note:"1 physical core = 2 vCPUs"},
      {id:"2.5", label:"Review SSH Key Pairs"}
    ]
  },
  {
    id:"s3", title:"Setting Up the networking Infra in AWS",
    note:"Networking requirements: connectivity between your on-prem datacenter and AWS (both DirectConnect and VPN are supported). Define the IP ranges (CIDR) for the AWS subnet used by NC2.",
    items:[
      {id:"3.1", label:"3.1 — Manual workflow", isGroup:true, note:"The NC2 portal can also create the new VPC, Subnets, etc. itself.",
        children:[
          {id:"3.1.1", label:"Create an AWS VPC",
            note:"CIDR requirements: between /16 and /23.\nNot allowed CIDRs: 192.168.5.0/24\nNot allowed CIDRs: 10.100.0.0/16, 10.200.32.0/24", noteType:"warn"},
          {id:"3.1.2", label:"Create private / public subnets"},
          {id:"3.1.3", label:"Attach an Internet Gateway"},
          {id:"3.1.4", label:"Create a NAT Gateway"},
          {id:"3.1.5", label:"Configure route tables and routing"}
        ]
      },
      {id:"3.2", label:"3.2 — Interconnection", isGroup:true,
        note:"2 implementations for NC2: Standard VPN if AHV native network integration · VPN via AWS Transit GW if Flow Networking with routing.",
        children:[
          {id:"3.2.1", label:"VPN Site to Site"},
          {id:"3.2.2", label:"Direct Connect"}
        ]
      },
      {id:"3.3", label:"3.3 — DNS resolution", isGroup:true,
        children:[
          {id:"3.3.1", label:"Enable DNS resolution (VPC attribute)"},
          {id:"3.3.2", label:"Enable DNS hostnames (VPC attribute)"}
        ]
      },
      {id:"3.4", label:"3.4 — Authorise outbound access on your firewall / proxy (optional)", tag:"🔶",
        note:"Needed for the Microservices Infrastructure (Flow Network)."}
    ]
  },
  {
    id:"s4", title:"Setting up the NC2 console", sub:"add your AWS Account as a Cloud Account", tag:"☁️",
    note:"Deployment of a CloudFormation Stack that creates 2 IAM Roles:\nNutanix-Clusters-High-Nc2-Cluster-Role-Prod → EC2 instances\nNutanix-Clusters-High-Nc2-Orchestrator-Role-Prod → Nutanix portal AWS Account",
    items:[
      {id:"4.1", label:"Add the AWS account as a Cloud Account in the NC2 console"},
      {id:"4.2", label:"Verify the CloudFormation Stack deployment and the 2 IAM roles created"},
      {id:"4.3", label:"Review CloudFormation Templates Customization options"}
    ]
  },
  {
    id:"s5", title:"Creating a Nutanix Cluster",
    items:[
      {id:"5.1", label:"Check supported AWS regions and instance types", tag:"🌍"},
      {id:"5.2", label:"Check supported instance tenancy types", tag:"🖥️"},
      {id:"5.3", label:"Follow the deployment stages"}
    ]
  },
  {
    id:"s6", title:"Deploying or register a Prism Central (optional)",
    items:[
      {id:"6.1", label:"Deploy a new Prism Central or register an existing one (optional)"}
    ]
  },
  {
    id:"s7", title:"Configure Networking for UVM",
    items:[
      {id:"7.1", label:"Configure Flow Virtual Networking",
        note:"Prism Central is mandatory for Flow Networking. Use rfc6598 for the CIDR of the external-subnet-nonat in the transit VPC."},
      {id:"7.2", label:"Configure native AWS VPC integration",
        note:"Creating and managing User VM Subnet(s) for external connectivity."}
    ]
  },
  {
    id:"s8", title:"Performing additional configuration after the cluster creation",
    note:"Data Protection, administration.",
    items:[
      {id:"8.1", label:"Manage the cluster through the NC2 portal (Cluster Management)"},
      {id:"8.2", label:"Configure Data at Rest encryption"},
      {id:"8.3", label:"Configure Disaster Recovery", isGroup:true,
        children:[
          {id:"8.3.1", label:"MST with Pilot Light"}
        ]
      },
      {id:"8.4", label:"Configure Cluster Protect"},
      {id:"8.5", label:"Configure Microsegmentation (FNS NG)"},
      {id:"8.6", label:"Log into the cluster using SSH"}
    ]
  }
];

// ---- state (in-memory only, no localStorage) ----
let checked = {};

function allLeafIds(){
  const ids = [];
  DATA.forEach(stage=>{
    stage.items.forEach(it=>{
      if(it.children){ it.children.forEach(c=>ids.push(c.id)); }
      else { ids.push(it.id); }
    });
  });
  return ids;
}

function noteHTML(text, warn){
  if(!text) return "";
  return `<div class="note${warn?' warn':''}">${escapeHTML(text)}</div>`;
}
function escapeHTML(s){
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function renderItem(it){
  const isChecked = checked[it.id] ? "checked" : "";
  const tag = it.tag ? `<span class="item-tag">${it.tag}</span>` : "";
  let childrenHTML = "";
  if(it.children){
    childrenHTML = `<ul class="item-children">${it.children.map(renderItem).join("")}</ul>`;
  }
  return `
    <li class="item ${isChecked}" data-id="${it.id}">
      <div class="item-row" onclick="toggleItem('${it.id}')">
        <span class="cb"><svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg></span>
        <span class="item-label">${escapeHTML(it.label)}${tag}</span>
      </div>
      ${noteHTML(it.note, it.noteType==="warn")}
      ${childrenHTML}
    </li>`;
}

function stageProgress(stage){
  let total=0, done=0;
  stage.items.forEach(it=>{
    if(it.children){
      it.children.forEach(c=>{ total++; if(checked[c.id]) done++; });
    } else {
      total++; if(checked[it.id]) done++;
    }
  });
  return {total, done};
}

function renderStages(){
  const container = document.getElementById("stages");
  container.innerHTML = DATA.map((stage,idx)=>{
    const {total, done} = stageProgress(stage);
    const complete = total>0 && done===total;
    return `
    <section class="stage" id="${stage.id}" data-id="${stage.id}">
      <div class="stage-head" onclick="toggleStage('${stage.id}')">
        <span class="stage-num mono">${String(idx+1).padStart(2,'0')}</span>
        <span class="stage-title">${escapeHTML(stage.title)}${stage.tag?` <span>${stage.tag}</span>`:""}${stage.sub?`<span class="stage-sub">${escapeHTML(stage.sub)}</span>`:""}</span>
        <span class="stage-badge">${done}/${total}</span>
        <span class="chev">▶</span>
      </div>
      <div class="stage-body">
        ${noteHTML(stage.note)}
        <ul class="items">${stage.items.map(renderItem).join("")}</ul>
      </div>
    </section>`;
  }).join("");

  DATA.forEach(stage=>{
    const {total, done} = stageProgress(stage);
    document.getElementById(stage.id).classList.toggle("complete", total>0 && done===total);
  });
}

function renderRail(){
  const rail = document.getElementById("rail");
  const existing = rail.querySelectorAll(".rail-node");
  existing.forEach(n=>n.remove());
  DATA.forEach((stage,idx)=>{
    const {total, done} = stageProgress(stage);
    const state = done===0 ? "" : (done===total ? "done" : "partial");
    const a = document.createElement("a");
    a.className = `rail-node ${state}`;
    a.href = `#${stage.id}`;
    a.innerHTML = `<span class="rail-dot mono">${done===total && total>0 ? "✓" : idx+1}</span><span class="rail-label">${escapeHTML(stage.title)}</span>`;
    rail.appendChild(a);
  });
  const total = rail.querySelectorAll(".rail-node").length;
  const doneCount = rail.querySelectorAll(".rail-node.done").length;
  const railHeight = rail.querySelector(".rail-line").offsetHeight;
  document.getElementById("railFill").style.height = total>0 ? (railHeight*(doneCount/total))+"px" : "0px";
}

function updateOverall(){
  const ids = allLeafIds();
  const doneCount = ids.filter(id=>checked[id]).length;
  const pct = ids.length ? Math.round(100*doneCount/ids.length) : 0;
  document.getElementById("overallFill").style.width = pct+"%";
  document.getElementById("overallPct").textContent = `${doneCount} / ${ids.length}`;
}

function refreshAll(){
  renderStages();
  renderRail();
  updateOverall();
  // re-attach open state
  document.querySelectorAll(".stage").forEach(s=>{
    if(openStages.has(s.dataset.id)) s.classList.add("open");
  });
}

const openStages = new Set();

function toggleItem(id){
  checked[id] = !checked[id];
  refreshAll();
}

function toggleStage(id){
  if(openStages.has(id)) openStages.delete(id); else openStages.add(id);
  document.getElementById(id).classList.toggle("open");
}

document.getElementById("expandAllBtn").addEventListener("click", ()=>{
  const allOpen = DATA.every(s=>openStages.has(s.id));
  DATA.forEach(s=>{
    if(allOpen) openStages.delete(s.id); else openStages.add(s.id);
  });
  document.getElementById("expandAllBtn").textContent = allOpen ? "Expand all" : "Collapse all";
  refreshAll();
});

document.getElementById("resetBtn").addEventListener("click", ()=>{
  if(confirm("Reset all progress?")){
    checked = {};
    refreshAll();
  }
});

document.getElementById("exportBtn").addEventListener("click", ()=>{
  const blob = new Blob([JSON.stringify({checked, exportedAt:new Date().toISOString()}, null, 2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "nc2-aws-progress.json";
  a.click();
  URL.revokeObjectURL(url);
});

document.getElementById("importBtn").addEventListener("click", ()=>{
  document.getElementById("importFile").click();
});
document.getElementById("importFile").addEventListener("change", (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (ev)=>{
    try{
      const data = JSON.parse(ev.target.result);
      checked = data.checked || {};
      refreshAll();
    }catch(err){
      alert("Invalid file.");
    }
  };
  reader.readAsText(file);
  e.target.value = "";
});

refreshAll();
</script>
</body>
</html>
